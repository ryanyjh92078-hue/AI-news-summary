<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechBrief - IT 뉴스 AI 요약</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 추가적인 커스텀 스타일 */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
        /* 로딩 애니메이션 */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="bg-white shadow-sm sticky top-0 z-40">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-3xl">🤖</span>
                <h1 class="text-2xl font-bold text-gray-950">Tech<span class="text-blue-600">Brief</span></h1>
            </div>
            <p class="text-sm text-gray-500">오늘의 IT 핵심 뉴스 AI 3줄 요약</p>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        
        <div id="loading-state" class="text-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-gray-600">최신 IT 뉴스를 불러오는 중입니다...</p>
        </div>

        <div id="error-state" class="hidden text-center py-20 bg-red-50 rounded-2xl border border-red-100">
            <span class="text-5xl mb-4 block">⚠️</span>
            <p class="text-red-600 font-semibold">뉴스를 불러오지 못했습니다.</p>
            <p class="text-red-500 text-sm mt-1">잠시 후 다시 시도해 주세요.</p>
        </div>

        <section id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden">
            </section>

    </main>

    <footer class="border-t border-gray-100 mt-20 bg-white">
        <div class="max-w-7xl mx-auto px-6 py-8 text-center text-gray-500 text-sm">
            <p>&copy; 2024 TechBrief. All rights reserved.</p>
            <p class="mt-1">Powered by Naver News API & Google Gemini AI</p>
        </div>
    </footer>


    <script>
        // 페이지가 로드되면 자동으로 실행되는 함수
        async function fetchAndDisplayNews() {
            const grid = document.getElementById('news-grid');
            const loading = document.getElementById('loading-state');
            const error = document.getElementById('error-state');

            try {
                // 1. 우리 백엔드 서버(server.js)의 API를 호출합니다.
                // 배포 후에는 자동으로 현재 도메인의 /api/news를 찾습니다.
                const response = await fetch('/api/news');
                
                if (!response.ok) {
                    throw new Error('서버 응답 에러');
                }

                const newsList = await response.json(); // DB에서 가져온 뉴스 배열

                if (newsList.length === 0) {
                    loading.innerHTML = '<p class="text-gray-500">아직 수집된 뉴스가 없습니다. <br> collect.js를 먼저 실행해 주세요.</p>';
                    return;
                }

                // 2. HTML 문자열을 생성하여 그리드에 삽입합니다.
                grid.innerHTML = newsList.map(news => `
                    <article 
                        onclick="location.href='detail.html?id=${news.id}'" 
                        class="bg-white p-7 rounded-3xl shadow-sm border border-gray-100 cursor-pointer hover:shadow-lg hover:-translate-y-1 transition-all duration-300 group"
                    >
                        <span class="inline-block bg-blue-50 text-blue-700 text-xs font-semibold px-3 py-1 rounded-full mb-4">
                            IT 일반
                        </span>
                        
                        <h3 class="text-xl font-bold mb-3 group-hover:text-blue-700 transition-colors line-clamp-2">
                            ${news.title}
                        </h3>
                        
                        <p class="text-gray-600 text-sm mb-5 line-clamp-2 leading-relaxed">
                            ${news.summary.replace(/-/g, '').substring(0, 100)}... 
                        </p>
                        
                        <div class="flex items-center justify-between text-sm text-gray-400 border-t border-gray-100 pt-4">
                            <span>${new Date(news.created_at).toLocaleDateString('ko-KR')}</span>
                            <span class="font-semibold text-blue-600 group-hover:translate-x-1 transition-transform">요약 보기 →</span>
                        </div>
                    </article>
                `).join('');

                // 3. 화면 상태 전환 (로딩 숨기고, 그리드 보여주기)
                loading.classList.add('hidden');
                grid.classList.remove('hidden');

            } catch (err) {
                // 에러 발생 시 에러 화면 보여주기
                console.error('뉴스 로딩 실패:', err);
                loading.classList.add('hidden');
                error.classList.remove('hidden');
            }
        }

        // 함수 실행
        fetchAndDisplayNews();
    </script>
</body>
</html>
