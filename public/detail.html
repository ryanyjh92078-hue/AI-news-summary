<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>뉴스 상세 요약</title>
</head>
<body class="bg-gray-50 p-6 md:p-20">
    <div class="max-w-3xl mx-auto bg-white p-8 md:p-12 rounded-3xl shadow-sm">
        <button onclick="history.back()" class="text-blue-600 mb-6">← 뒤로가기</button>
        <h1 id="title" class="text-2xl md:text-3xl font-bold mb-8 text-gray-900 leading-tight"></h1>
        <div class="bg-blue-50 p-6 rounded-2xl mb-8">
            <h2 class="font-bold text-blue-800 mb-4">🤖 Gemini AI 요약</h2>
            <p id="summary" class="text-gray-700 leading-relaxed whitespace-pre-wrap"></p>
        </div>
        <a id="link" target="_blank" class="block text-center bg-gray-900 text-white py-4 rounded-xl font-bold">기사 원문 보기</a>
    </div>

    <script>
        async function loadDetail() {
            const id = new URLSearchParams(location.search).get('id');
            const res = await fetch(`/api/news/${id}`);
            const n = await res.json();
            
            document.getElementById('title').innerText = n.title;
            document.getElementById('summary').innerText = n.summary;
            document.getElementById('link').href = n.origin_url;
        }
        loadDetail();
    </script>
</body>
</html>
