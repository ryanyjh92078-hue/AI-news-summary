<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>TechBrief - IT 뉴스 요약</title>
</head>
<body class="bg-gray-50 p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-10 text-gray-900 text-center">오늘의 IT 뉴스 요약</h1>
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="col-span-full text-center text-gray-500">뉴스를 불러오는 중입니다...</p>
        </div>
    </div>

    <script>
        async function loadNews() {
            try {
                const res = await fetch('/api/news');
                const data = await res.json();
                const grid = document.getElementById('news-grid');
                
                if (data.length === 0) {
                    grid.innerHTML = "<p class='col-span-full text-center'>저장된 뉴스가 없습니다. /admin/collect를 먼저 실행하세요.</p>";
                    return;
                }

                grid.innerHTML = data.map(n => `
                    <div onclick="location.href='detail.html?id=${n.id}'" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 cursor-pointer hover:shadow-md transition">
                        <h2 class="font-bold text-xl mb-3 text-gray-800 line-clamp-2">${n.title}</h2>
                        <p class="text-gray-500 text-sm">AI 3줄 요약 보기 →</p>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('news-grid').innerHTML = "데이터 로드 실패";
            }
        }
        loadNews();
    </script>
</body>
</html>
